version: '3.8'

services:

  postgres:
    image: postgres:16
    container_name: property-postgres
    environment:
      POSTGRES_DB: urbannest_db
      POSTGRES_USER: urbannest
      POSTGRES_PASSWORD: urbannest
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: property-keycloak
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: postgres
      KC_DB_URL_DATABASE: urbannest_db
      KC_DB_USERNAME: urbannest
      KC_DB_PASSWORD: urbannest
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8081:8080"
    depends_on:
      - postgres

volumes:
  postgres_data: