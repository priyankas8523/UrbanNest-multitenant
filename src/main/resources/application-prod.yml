spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 50

  jpa:
    properties:
      hibernate:
        format_sql: false

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI}

keycloak:
  admin:
    server-url: ${KEYCLOAK_SERVER_URL}
    client-secret: ${KC_ADMIN_SECRET}
  app:
    company-portal-client-secret: ${KC_COMPANY_SECRET}
    client-portal-client-secret: ${KC_CLIENT_SECRET}
    token-url: ${KEYCLOAK_TOKEN_URL}
    logout-url: ${KEYCLOAK_LOGOUT_URL}

logging:
  level:
    com.urbannest: INFO
    org.hibernate.SQL: WARN
